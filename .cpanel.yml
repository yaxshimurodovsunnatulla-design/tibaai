---
deployment:
  tasks:
    - /bin/cp -R api /home/tibaaiuz/public_html/
    - /bin/cp -R assets /home/tibaaiuz/public_html/
    - /bin/cp -R components /home/tibaaiuz/public_html/
    - /bin/cp -R config /home/tibaaiuz/public_html/
    - /bin/cp -R pages /home/tibaaiuz/public_html/
    - /bin/cp -R data /home/tibaaiuz/public_html/ 2>/dev/null; true
    - /bin/cp .htaccess /home/tibaaiuz/public_html/
    - /bin/cp index.php /home/tibaaiuz/public_html/
    - /bin/cp router.php /home/tibaaiuz/public_html/
    - /bin/cp init.php /home/tibaaiuz/public_html/
    - /bin/cp cleanup.php /home/tibaaiuz/public_html/
    - /bin/cp robots.txt /home/tibaaiuz/public_html/
    - /bin/cp sitemap.xml /home/tibaaiuz/public_html/
    - mkdir -p /home/tibaaiuz/public_html/generated
    - mkdir -p /home/tibaaiuz/public_html/tmp
    - mkdir -p /home/tibaaiuz/public_html/data
    - chmod 755 /home/tibaaiuz/public_html/generated
    - chmod 755 /home/tibaaiuz/public_html/tmp
    - chmod 755 /home/tibaaiuz/public_html/data
