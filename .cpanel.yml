---
deployment:
  tasks:
    - export DEPLOYPATH=/home/tibaaiuz/public_html
    - /bin/cp -R api $DEPLOYPATH/
    - /bin/cp -R assets $DEPLOYPATH/
    - /bin/cp -R components $DEPLOYPATH/
    - /bin/cp -R config $DEPLOYPATH/
    - /bin/cp -R pages $DEPLOYPATH/
    - /bin/cp -R data $DEPLOYPATH/ 2>/dev/null; true
    - /bin/cp .htaccess $DEPLOYPATH/
    - /bin/cp index.php $DEPLOYPATH/
    - /bin/cp router.php $DEPLOYPATH/
    - /bin/cp init.php $DEPLOYPATH/
    - /bin/cp cleanup.php $DEPLOYPATH/
    - /bin/cp robots.txt $DEPLOYPATH/
    - /bin/cp sitemap.xml $DEPLOYPATH/
    - mkdir -p $DEPLOYPATH/generated
    - mkdir -p $DEPLOYPATH/tmp
    - mkdir -p $DEPLOYPATH/data
    - chmod 755 $DEPLOYPATH/generated
    - chmod 755 $DEPLOYPATH/tmp
    - chmod 755 $DEPLOYPATH/data
